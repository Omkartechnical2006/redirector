<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* Simple & Professional Styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .loader-box { text-align: center; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a73e8; /* Google Blue */
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 16px; color: #5f6368; font-weight: 400; }
    </style>
</head>
<body>

<div class="loader-box">
    <div class="spinner"></div>
    <h1 id="status">Connecting...</h1>
</div>

<script>
    // --- AAPKE HARDCODED LINKS ---
    const REDIRECT_MAP = {
        "/app": "https://eliteproarenas.onrender.com/demo",
        "/feedback": "https://eliteproarenas.onrender.com/feedback/general"
    };

    // Default link agar koi galat path par aaye
    const DEFAULT_URL = "https://eliteproarenas.onrender.com"; 

    function handleRedirect() {
        // 1. Current path get karein (e.g., /app)
        const path = window.location.pathname.toLowerCase().replace(/\/$/, "");
        const statusEl = document.getElementById('status');

        // 2. Check karein ki path map mein hai ya nahi
        let target = REDIRECT_MAP[path];

        if (target) {
            statusEl.innerText = "Redirecting to " + path.substring(1).toUpperCase() + "...";
        } else {
            // Agar /app ya /feedback ke alawa kuch aur ho
            target = DEFAULT_URL;
            statusEl.innerText = "Redirecting...";
        }

        // 3. 0.5 second baad redirect karein (Smooth feel ke liye)
        setTimeout(() => {
            window.location.replace(target);
        }, 500);
    }

    // Page load hote hi function run karein
    window.onload = handleRedirect;
</script>

</body>
</html>
